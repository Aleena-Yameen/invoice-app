<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Reminder System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>💼 Invoice Reminder System</h1>

        <div class="form-group">
            <input id="customer" placeholder="Customer Name">

            <input id="amount" type="number" placeholder="Invoice Amount">

            <input id="dueDate" type="date">

            <button class="add-btn" onclick="addInvoice()">
                Add Invoice
            </button>
        </div>

        <div class="invoice-list" id="list"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
